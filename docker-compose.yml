version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: elevator-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: elevator_ems
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7
    container_name: elevator-redis
    ports:
      - "6379:6379"

volumes:
  mongodb_data:
