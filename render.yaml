services:
  - type: web
    name: elevator-ems-backend
    runtime: python
    rootDir: backend
    buildCommand: bash ./build.sh
    startCommand: bash ./start.sh
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: mobileems.vercel.app,backend-9ulf.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://mobileems.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://mobileems.vercel.app
      - key: DB_CONN_MAX_AGE
        value: "600"
      - key: DB_SSL_REQUIRE
        value: "True"
      - key: DATABASE_URL
        value: ""
      - key: REDIS_URL
        value: ""
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_NAME
        value: elevator_ems
      - key: FIREBASE_CREDENTIALS_PATH
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: UDP_LISTENER_HOST
        value: 0.0.0.0
      - key: UDP_LISTENER_PORT
        value: "9000"
